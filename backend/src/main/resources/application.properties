spring.application.name=eventora-backend
server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/eventoradb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# REDIS CONFIG
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

# SMTP CONFIG
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=syncoraevents@gmail.com
spring.mail.password=qguzoqxonctethxp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# JWT
jwt.secret=eventoraSecretKey2024SuperSecureKeyAtLeast256BitsLong!@#$%
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# OTP Config
otp.expiry.minutes=5
otp.length=6

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
file.upload.dir=${UPLOAD_DIR:uploads}

# AI Microservice
ai.service.url=${AI_SERVICE_URL:http://localhost:8000}

# CORS
cors.allowed.origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized

# Logging
logging.level.com.eventora=INFO
logging.level.org.springframework.security=WARN
