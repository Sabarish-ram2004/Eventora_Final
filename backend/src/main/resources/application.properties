spring.application.name=eventora-backend
server.port=${PORT:8080}
server.address=0.0.0.0

# ✅ SUPABASE DIRECT DATABASE (NOT pooler)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ✅ HIKARI PRODUCTION TUNING
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=180000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.auto-commit=false

# ✅ JPA SAFE CONFIG
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ✅ REDIS CONFIG (ENV BASED)
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.timeout=2000ms

spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=1
spring.data.redis.lettuce.pool.time-between-eviction-runs=30s

# ✅ SENDGRID SMTP
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

app.mail.from=${MAIL_FROM}

# ✅ JWT
jwt.secret=eventoraSecretKey2024SuperSecureKeyAtLeast256BitsLong!@#$%
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ✅ FILE UPLOAD
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
file.upload.dir=${UPLOAD_DIR:uploads}

# ✅ CORS
cors.allowed.origins=${CORS_ORIGINS:http://localhost:5173}

# ✅ ACTUATOR
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

logging.level.com.eventora=INFO