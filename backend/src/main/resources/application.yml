server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: eventora-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/eventora
    username: ${DB_USERNAME:eventora_user}
    password: ${DB_PASSWORD:eventora_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:noreply@eventora.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  cache:
    type: redis
    redis:
      time-to-live: 3600000

app:
  jwt:
    secret: ${JWT_SECRET:eventora-super-secret-jwt-key-2024-minimum-256-bits-long}
    expiration: 86400000 # 24 hours
    refresh-expiration: 604800000 # 7 days
  otp:
    expiry-minutes: 5
    max-attempts: 3
    length: 6
  ai-service:
    url: ${AI_SERVICE_URL:http://localhost:5000}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
  upload:
    dir: ${UPLOAD_DIR:./uploads}
    max-size: 10485760 # 10MB
  redis:
    chatbot-ttl: 3600 # 1 hour
    otp-ttl: 300 # 5 minutes
    session-ttl: 86400 # 24 hours

logging:
  level:
    com.eventora: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
