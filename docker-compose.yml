version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: eventora-postgres
    environment:
      POSTGRES_DB: eventora
      POSTGRES_USER: eventora_user
      POSTGRES_PASSWORD: eventora_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - eventora-net

  redis:
    image: redis:7-alpine
    container_name: eventora-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - eventora-net

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: eventora-ai
    ports:
      - "5000:5000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=5000
      - DEBUG=false
    depends_on:
      - redis
    networks:
      - eventora-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eventora-backend
    ports:
      - "8080:8080"
    environment:
      - DB_USERNAME=eventora_user
      - DB_PASSWORD=eventora_pass
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AI_SERVICE_URL=http://ai-service:5000
      - MAIL_HOST=smtp.gmail.com
      - MAIL_PORT=587
      - MAIL_USERNAME=${MAIL_USERNAME:-noreply@eventora.com}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET:-eventora-super-secret-jwt-key-2024-minimum-256-bits}
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000
    depends_on:
      - postgres
      - redis
      - ai-service
    networks:
      - eventora-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eventora-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - eventora-net

volumes:
  postgres_data:
  redis_data:

networks:
  eventora-net:
    driver: bridge
